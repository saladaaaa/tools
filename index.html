<title>Ferramentas | Alvaro Abreu</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#0F1117;color:#E8EAF0;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:60px 20px;
  }
  h1{font-size:clamp(24px,4vw,36px);font-weight:700;margin-bottom:8px}
  .subtitle{color:#9BA1B0;font-size:15px;margin-bottom:48px}
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;width:100%;max-width:900px;
  }
  .card{
    background:#1E2130;border:1px solid #2A2E3D;border-radius:14px;
    padding:28px;text-decoration:none;color:inherit;
    transition:all .2s ease;display:flex;gap:16px;align-items:flex-start;
  }
  .card:hover{border-color:#4D9FFF;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
  .card-icon{
    width:48px;height:48px;border-radius:12px;flex-shrink:0;
    background:linear-gradient(135deg,#0066CC,#0050A3);
    display:grid;place-items:center;
    box-shadow:inset 0 -2px 0 rgba(0,0,0,.12);
  }
  .card-icon svg{width:26px;height:26px;fill:#fff}
  .card-text h2{font-size:17px;font-weight:600;margin-bottom:6px}
  .card-text p{font-size:13px;color:#9BA1B0;line-height:1.5}
  .badge{
    display:inline-block;font-size:11px;font-weight:600;
    background:#15302A;color:#36B37E;padding:2px 8px;border-radius:6px;
    margin-top:8px;
  }
  footer{margin-top:auto;padding-top:60px;color:#6B7185;font-size:13px}
  footer a{color:#4D9FFF;text-decoration:none}
</style>
